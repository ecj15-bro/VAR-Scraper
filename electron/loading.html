<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cloudbox VAR Hunter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      -webkit-app-region: drag;
    }
    .logo {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #ffffff;
      margin-bottom: 6px;
    }
    .logo span { color: #00ff88; }
    .tagline {
      font-size: 13px;
      color: #666688;
      margin-bottom: 40px;
      letter-spacing: 0.5px;
    }
    .bar-track {
      width: 220px;
      height: 3px;
      background: #1a1a2e;
      border-radius: 2px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00cc66, #00ff88);
      border-radius: 2px;
      animation: load 3s ease-in-out forwards;
    }
    @keyframes load {
      0%   { width: 0%; }
      30%  { width: 40%; }
      60%  { width: 70%; }
      85%  { width: 88%; }
      100% { width: 95%; }
    }
    .status {
      margin-top: 16px;
      font-size: 11px;
      color: #444466;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div class="logo">Cloudbox <span>VAR Hunter</span></div>
  <div class="tagline">AI-powered VAR partner prospecting</div>
  <div class="bar-track"><div class="bar-fill"></div></div>
  <div class="status">Starting server...</div>
</body>
</html>
